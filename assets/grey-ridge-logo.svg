<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="24" fill="#1a1a2e"/>
  <!-- Signal wave ridge -->
  <path d="M 20 180 Q 50 60, 80 140 T 130 80 T 170 160 T 210 40 T 236 120" 
        fill="none" stroke="#00d4aa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Secondary trace -->
  <path d="M 20 200 Q 50 100, 80 160 T 130 110 T 170 180 T 210 70 T 236 145" 
        fill="none" stroke="#0088aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Data dots on peaks -->
  <circle cx="80" cy="140" r="4" fill="#00d4aa"/>
  <circle cx="130" cy="80" r="4" fill="#00d4aa"/>
  <circle cx="210" cy="40" r="5" fill="#00d4aa"/>
  <!-- Small grid dots background -->
  <g fill="#00d4aa" opacity="0.08">
    <circle cx="40" cy="40" r="1.5"/>
    <circle cx="80" cy="40" r="1.5"/>
    <circle cx="120" cy="40" r="1.5"/>
    <circle cx="160" cy="40" r="1.5"/>
    <circle cx="200" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/>
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="200" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/>
    <circle cx="160" cy="120" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/>
    <circle cx="200" cy="160" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/>
    <circle cx="120" cy="200" r="1.5"/>
    <circle cx="200" cy="200" r="1.5"/>
  </g>
</svg>
